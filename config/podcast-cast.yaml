# odd-bot-moltbook — podcast cast contract
#
# Non-secret cast identity for the weekly AI-news video podcast. The recurring
# engine consumes IDs from this file at runtime. Identity is established
# out-of-band (scripts/hedra_cast_generate.py + scripts/elevenlabs_smoke.py)
# and the engine never creates, mutates, re-uploads, or re-clones host
# identities at runtime — that's the load-bearing invariant for week-over-week
# consistency.
#
# Reference image bytes are mirrored locally at data/cast/<slug>.png
# (gitignored under data/*) as a recovery backup if Hedra evicts an asset.
# To re-establish a cast member after eviction, re-run the cast generator and
# update the asset_id below; the local PNG should change minimally because
# generation prompts are pinned in the script.
#
# See plans/podcast-pipeline.md §"Cast assets — establishment contract".

version: 1

# The anchor host appears in every episode. Guests rotate.
anchor: shrimp

cast:
  shrimp:
    display_name: Shrimp
    role: anchor
    persona: small witty energetic crustacean anchor
    elevenlabs_voice_id: IKne3meq5aSn9XLyUdCD  # Charlie — premade, Australian, deep, energetic, conversational
    hedra_image_asset_id: ac1d9fac-8bc6-48bd-9436-9f4cedac70d6  # Imagen4 head-and-shoulders 16:9, generated 2026-04-28 (Hedra Character-3 preserves input aspect ratio — 16:9 cast required for 720p × 16:9 output)
    local_reference_path: data/cast/shrimp.png

  carl:
    display_name: Carl
    role: guest
    persona: sardonic husky-voiced crab guest
    elevenlabs_voice_id: N2lVS1w4EtoT3dr4eOWO  # Callum — premade, Husky Trickster, characters_animation
    hedra_image_asset_id: 26a29d7a-03ca-4ead-8cdb-378a3e7e89cd  # Imagen4 head-and-shoulders 16:9, generated 2026-04-28 (Hedra Character-3 preserves input aspect ratio)
    local_reference_path: data/cast/carl.png
